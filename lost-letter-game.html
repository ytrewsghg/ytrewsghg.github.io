<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>校园遗失的旧信</title>
<style>
:root{--bg:#faf5ef;--card:#fffdf7;--t:#3d3226;--tl:#8b7355;--a:#e8956a;--a2:#6bb5c9;--g:#d4a843;--bd:#e8dcc8;--sh:0 4px 24px rgba(0,0,0,.08);--r:18px;--safe-bottom:env(safe-area-inset-bottom,0px)}
[data-theme=dark]{--bg:#1a1614;--card:#26211b;--t:#e8dcc8;--tl:#b8a58a;--a:#f0a880;--a2:#7cc8d8;--g:#e0b85c;--bd:#3d3226;--sh:0 4px 24px rgba(0,0,0,.3)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;position:fixed;top:0;left:0;touch-action:manipulation;-webkit-overflow-scrolling:none;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);display:flex;justify-content:center;align-items:center}
#app{width:100%;max-width:440px;height:100vh;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;background:var(--bg);transition:background .4s,color .4s}
/* Topbar */
#tb{height:44px;min-height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 14px;font-size:11px;border-bottom:1px solid var(--bd);background:var(--card);z-index:10}
#tb .pb{width:64px;height:5px;background:var(--bd);border-radius:3px;overflow:hidden}
#tb .pbf{height:100%;background:linear-gradient(90deg,var(--a),var(--g));transition:width .5s;border-radius:3px}
#tb .st{gap:8px;align-items:center;display:flex}
#tb .si{font-size:16px}
#tb .mu{background:none;border:none;font-size:20px;cursor:pointer;color:var(--t);padding:2px 4px}
/* Character */
#ca{display:flex;align-items:center;justify-content:center;padding:4px 14px;gap:8px;min-height:62px}
#av{width:48px;height:48px;border-radius:50%;flex-shrink:0;cursor:pointer;font-size:30px;display:flex;align-items:center;justify-content:center;transition:transform .15s;background:var(--card);user-select:none}
#av:active{transform:scale(.85)}
#cb{display:none;position:relative;background:var(--card);border:1.5px solid var(--a);border-radius:12px 12px 12px 3px;padding:8px 11px;font-size:12px;max-width:230px;box-shadow:var(--sh);line-height:1.5;animation:bIn .35s cubic-bezier(.34,1.56,.64,1)}
#cb:after{content:'';position:absolute;bottom:-7px;left:12px;width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-top:7px solid var(--a)}
/* Scene */
#sg{padding:3px 14px;font-size:10px;color:var(--tl);display:flex;align-items:center;gap:4px}
/* Story */
#sa{flex:1;overflow-y:auto;padding:4px 14px 12px;padding-bottom:18px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
#sc{background:var(--card);border-radius:var(--r);padding:16px 14px;box-shadow:var(--sh);line-height:1.75;font-size:14px;transition:all .4s;min-height:80px;border:1px solid var(--bd);animation:cIn .5s ease}
#sc .ico{text-align:center;font-size:32px;margin-bottom:5px;animation:flt 3s ease-in-out infinite}
#st{white-space:pre-wrap;word-break:break-word}
.csr{display:inline-block;width:2px;height:1em;background:var(--a);vertical-align:text-bottom;animation:blink .8s infinite}
/* Choices */
#ch{display:flex;flex-direction:column;gap:7px;margin-top:12px}
.chb{display:flex;align-items:center;gap:6px;padding:14px 13px;min-height:48px;border-radius:11px;border:1.5px solid var(--bd);background:var(--bg);color:var(--t);font-size:13px;cursor:pointer;transition:all .2s;width:100%;animation:chIn .35s ease backwards;font-family:inherit}
.chb:nth-child(1){animation-delay:.04s}
.chb:nth-child(2){animation-delay:.1s}
.chb:nth-child(3){animation-delay:.16s}
.chb:active{transform:scale(.97);background:var(--a);color:#fff;border-color:var(--a)}
/* Minimap */
#mm{padding:5px 14px 10px;display:flex;gap:4px;align-items:center;font-size:10px;color:var(--tl);overflow-x:auto;white-space:nowrap;border-top:1px solid var(--bd);background:var(--card)}
#mm .dt{width:6px;height:6px;border-radius:50%;border:1.5px solid var(--tl);flex-shrink:0}
#mm .dt.ac{background:var(--a);border-color:var(--a)}
#mm .dt.dn{background:var(--g);border-color:var(--g)}
/* Minigame */
#mo{position:absolute;inset:0;background:rgba(0,0,0,.65);z-index:50;display:none;align-items:center;justify-content:center}
#mo.on{display:flex}
#mo .mb{background:var(--card);border-radius:var(--r);padding:22px 18px;width:88%;max-width:340px;text-align:center;box-shadow:0 8px 36px rgba(0,0,0,.2)}
#mo h3{font-size:15px;margin-bottom:8px}
#mo p{font-size:12px;color:var(--tl);margin-bottom:14px}
#mo .np{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:180px;margin:0 auto 10px}
#mo .nb{padding:10px;border-radius:9px;border:1.5px solid var(--bd);background:var(--bg);font-size:18px;cursor:pointer;font-family:inherit}
#mo .nb:active{background:var(--a);color:#fff}
#mo .mi{font-size:28px;letter-spacing:5px;text-align:center;margin-bottom:10px;font-family:monospace;min-height:36px}
#mo .ms{padding:9px 28px;border-radius:18px;border:none;background:var(--a);color:#fff;font-size:14px;cursor:pointer;margin:3px;font-family:inherit}
#mo .mc{padding:7px 18px;border-radius:18px;border:1.5px solid var(--bd);background:transparent;color:var(--tl);font-size:12px;cursor:pointer;margin:3px;font-family:inherit}
#mo .mh{font-size:10px;color:var(--a);margin-top:6px;cursor:pointer}
#mo canvas{border-radius:10px;margin-bottom:10px}
/* Ending */
#eo{position:absolute;inset:0;background:var(--bg);z-index:60;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;overflow-y:auto}
#eo.on{display:flex}
#eo .et{font-size:24px;font-weight:700;color:var(--g);margin-bottom:6px;text-align:center}
#eo .es{font-size:13px;color:var(--tl);margin-bottom:16px;text-align:center;font-style:italic}
#eo .ec{background:var(--card);border-radius:var(--r);padding:18px;box-shadow:var(--sh);line-height:1.8;font-size:14px;max-width:380px;text-align:center;animation:cIn .6s ease}
#eo .eb{padding:12px 36px;min-height:48px;border-radius:20px;border:none;background:var(--a);color:#fff;font-size:15px;cursor:pointer;margin-top:16px;font-family:inherit}
#eo .ebb{padding:8px 20px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--tl);font-size:13px;cursor:pointer;margin-top:8px;font-family:inherit}
#eo .fo{font-size:11px;color:var(--tl);margin-top:12px}
/* Save panel */
#sp{position:absolute;top:48px;right:8px;background:var(--card);border-radius:12px;box-shadow:var(--sh);border:1px solid var(--bd);z-index:30;padding:10px;display:none;flex-direction:column;gap:6px;min-width:120px}
#sp.on{display:flex}
#sp button{padding:10px 16px;min-height:42px;border-radius:8px;border:1.5px solid var(--bd);background:var(--bg);font-size:12px;cursor:pointer;font-family:inherit;color:var(--t)}
#sp button:active{background:var(--a);color:#fff}
/* Toast */
#to{position:absolute;bottom:100px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:8px 18px;border-radius:20px;font-size:12px;z-index:70;pointer-events:none;opacity:0;transition:opacity .3s}
#to.on{opacity:1}
/* Confetti */
.confetti{position:fixed;pointer-events:none;z-index:100;animation:fall linear forwards}
/* Animations */
@keyframes bIn{from{opacity:0;transform:translateY(8px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes chIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:translateX(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}
@keyframes flt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
/* Scrollbar */
#sa::-webkit-scrollbar,#eo::-webkit-scrollbar{width:3px}
#sa::-webkit-scrollbar-thumb,#eo::-webkit-scrollbar-thumb{background:var(--bd);border-radius:3px}
</style>
</head>
<body>
<div id="app">
<div id="tb"><div class="pb"><div class="pbf" id="pbf" style="width:0%"></div></div><span style="font-size:10px;color:var(--tl);margin-left:6px" id="pbt">0%</span><div class="st"><span class="si" id="fav">🤍</span><span class="si" id="fsc">⭐0/6</span><button class="mu" id="mu">☰</button></div></div>
<div id="sp"><button id="sp-save">💾 保存进度</button><button id="sp-load">📂 读取进度</button><button id="sp-reset">🔄 重新开始</button><button id="sp-theme">🌙 切换主题</button></div>
<div id="ca"><div id="cb"></div><div id="av">👧</div></div>
<div id="sg">📍 老图书馆</div>
<div id="sa"><div id="sc"><div id="st"></div><div id="ch"></div></div></div>
<div id="mm"><span style="font-size:10px">🗺️</span><span class="dt ac"></span>图书馆 <span class="dt"></span>天台 <span class="dt"></span>操场 <span class="dt"></span>小卖部 <span class="dt"></span>美术室 <span class="dt"></span>天文台</div>
<div id="mo"><div class="mb" id="mg-content"></div></div>
<div id="eo"></div>
<div id="to"></div>
</div>

<script>
// ===== 故事数据 =====
const SD = {
"start":{id:"start",type:"narrative",emotion:"thinking",icon:"📚",scene:"老图书馆",
text:`老图书馆的下午，阳光像撒了一地的碎金子。

你正在找一本《如何科学地逃课》，手一滑，书掉在了地上——

啪嗒。

从书页里飘出一封信，黄黄的，皱皱的，像是被压了好多年。

你捡起来一看，上面写着一行字：

「那天在操场，我没能说出口的话，你还记得吗？」

你愣了三秒，然后冒出一个念头：
「谁写的啊？字还挺好看。」

看板娘小橘突然冒出来：
「喂喂喂，这可是传说中的『幽灵情书』！据说捡到的人会遇到怪事！」

你……`,
bubble:{char:"orange",text:"哇！一封信！快打开看看！说不定是情书呢！"},
choices:[
{t:"🔍 仔细检查信封（看看有没有别的线索）",n:"checkEnvelope"},
{t:"📖 去查借阅记录（谁借过这本书？）",n:"libraryRecord"},
{t:"😅 装没看见，把信塞回去（怂）",n:"chickenOut"}
]},

"checkEnvelope":{id:"checkEnvelope",type:"narrative",emotion:"surprised",icon:"✉️",scene:"老图书馆",collectible:"汽水罐",
text:`你翻来覆去地看信封，发现角落里有三个小小的字：

「看·星·空」

下面还有一行更小的字：
「PS：别告诉王姨我又偷喝她的汽水了。」

你：？？？

这封信到底是谁写的？怎么还带告密的？

小橘在旁边煽风点火：
「哇！星空！好浪漫！该不会是天文台的谁写的吧？」`,
bubble:{char:"orange",text:"星空！天文台！快去找线索！"},
choices:[
{t:"🔭 去天文台看看",n:"observatory"},
{t:"📖 还是先去查借阅记录吧",n:"libraryRecord"}
]},

"chickenOut":{id:"chickenOut",type:"narrative",emotion:"surprised",icon:"😰",scene:"老图书馆",
text:`你默默地把信塞回了书里，拍了拍封面：
「我什么都没看见。」

然后你转身要走——

咔嚓。

你踩到了一个易拉罐。

低头一看，罐子上画着一个笑脸，旁边写着：
「你逃不掉的 :-)」

你：……

好吧，看来这封信赖上你了。`,
bubble:{char:"orange",text:"哈哈哈你跑不掉的！命运已经选中你了！"},
choices:[
{t:"😤 认命了，回去捡信",n:"start"},
{t:"🤔 研究一下这个易拉罐",n:"canMystery"}
]},

"canMystery":{id:"canMystery",type:"narrative",emotion:"thinking",icon:"🥫",scene:"老图书馆",collectible:"易拉罐",
text:`你捡起易拉罐，发现上面写着：

「周六下午三点，小卖部，有个人等你。」

小橘突然插嘴：
「周六？小卖部？王姨的店？

——等等，该不会是那个传说中『每周六都来买两瓶汽水』的神秘人吧！」

你的好奇心被彻底勾起来了。`,
bubble:{char:"orange",text:"小卖部！王姨肯定知道些什么！"},
choices:[
{t:"🧃 去小卖部找王姨",n:"canteen"},
{t:"📖 还是先查借阅记录",n:"libraryRecord"}
]},

"libraryRecord":{id:"libraryRecord",type:"narrative",emotion:"thinking",icon:"📖",scene:"图书馆二楼",
text:`你跑到二楼借阅处，翻出那本《飞鸟集》的借阅卡。

上面只有两个名字：

📌 林晨 —— 三年前借阅
📌 苏晚 —— 两年前借阅

卡片背面还有一行铅笔字，字迹娟秀：
「有些话，写在书里比说出口容易。」

小橘在你耳边小声说：
「林晨是校篮球队的！苏晚是美术社的！
——你选谁？选谁？选谁？」

你：……你好吵。

（你注意到借阅卡背面有一串数字：3-7-15，似乎是个密码……）`,
bubble:{char:"orange",text:"借阅记录有密码！要不要试试破解？"},
choices:[
{t:"🏀 去找林晨（他好像还在学校？）",n:"linChenMeet"},
{t:"🎨 去找苏晚（美术社应该有人）",n:"suWanMeet"},
{t:"🔢 试着破解借阅卡上的密码",n:"puzzlePassword"}
]},

"puzzlePassword":{id:"puzzlePassword",type:"password",emotion:"thinking",icon:"🔐",scene:"图书馆二楼",
text:`借阅卡背面写着：3-7-15

下面有一行小字：「三乘以七，再减去十五」

小橘凑过来：「这太简单了吧！3×7=21，21-15=6！」

请输入密码：`,
bubble:{char:"orange",text:"答案是6！快输入密码！"},
choices:[
{t:"6",n:"puzzleWin"},
{t:"3",n:"puzzleFail"},
{t:"7",n:"puzzleFail"},
{t:"15",n:"puzzleFail"}
]},

"puzzleWin":{id:"puzzleWin",type:"narrative",emotion:"happy",icon:"🔓",scene:"图书馆密室",collectible:"诗稿",
text:`你输入密码"6"，咔哒一声——

书架后面的暗格打开了！

里面有一张泛黄的诗稿，字迹潦草但认真：

「操场的风吹过你的发梢，
我在三分线外假装投篮。
其实每一球，
都是为了偷看你一眼。」

署名：一个不敢送信的笨蛋

小橘感动得抹眼泪：
「呜呜呜，这是什么纯爱战士……一定是林晨写的！」`,
bubble:{char:"orange",text:"是林晨的诗！我们快去找他！"},
choices:[
{t:"🏀 去找林晨",n:"linChenMeet"},
{t:"🎨 去找苏晚",n:"suWanMeet"}
]},

"puzzleFail":{id:"puzzleFail",type:"narrative",emotion:"thinking",icon:"❌",scene:"图书馆二楼",
text:`密码不对……

小橘拍了拍你的肩膀：「别灰心！再想想！3×7-15=？」`,
bubble:{char:"orange",text:"笨蛋！答案是6！3×7=21，21-15=6！"},
choices:[
{t:"🔢 再试一次密码",n:"puzzlePassword"},
{t:"🏀 算了，先去找林晨",n:"linChenMeet"}
]},

"linChenMeet":{id:"linChenMeet",type:"narrative",emotion:"happy",icon:"🏀",scene:"操场·篮球场",collectible:"篮球",
text:`你在篮球场找到了林晨。

他正在三分线外投篮，嗖——进了。

你走过去，还没开口，他就先说话了：

「你捡到那封信了？」

你：？？？你怎么知道？

他擦了擦汗，笑了：
「因为那是我写的。」

「不过……我写完之后就没敢送出去，夹在书里就忘了。」
「所以，你是来还我信的吗？」

你突然有点尴尬：「呃……我还没看完。」

林晨大笑：「没事！要不你先留着？反正我写都写了。」

这时，旁边传来一个声音：
「哟，晨哥，你还有这文艺的一面呢？」`,
bubble:{char:"orange",text:"林晨好帅啊！但他居然会写情书？！"},
choices:[
{t:"📝 问林晨为什么要写这封信",n:"linChenReason"},
{t:"🤣 调侃他『原来你也会写情书啊』",n:"linChenTease"}
]},

"linChenReason":{id:"linChenReason",type:"narrative",emotion:"thinking",icon:"💭",scene:"操场·篮球场",
text:`林晨收起笑容，认真地说：

「其实……那天是我转学前的最后一天。」

「我想告诉一个人，我注意她很久了。但是走到她面前的时候，我怂了。」

「后来我把信夹在书里，想着『如果她能看到就好了』。」
「没想到，三年后是你看到了。」

你问：「那你还想找到那个人吗？」

林晨沉默了三秒：
「想啊，但是——」
「我连她叫什么都不知道。」

你：？？？

林晨挠头：
「我只知道她经常在操场边画画，画背影。」

你心里一动：画背影？

小橘突然大叫：
「啊！是苏晚！肯定是苏晚！」`,
bubble:{char:"orange",text:"画背影的女生！是苏晚啊！"},
choices:[
{t:"🎨 告诉林晨，那个画画的人可能是苏晚",n:"linChenSuWan"},
{t:"📮 帮他送这封信（你来做信使）",n:"linChenMessenger"}
]},

"linChenTease":{id:"linChenTease",type:"narrative",emotion:"happy",icon:"😆",scene:"操场·篮球场",
text:`你笑着打趣他：
「没想到篮球队长还会写情书呢～」

林晨的脸刷地红了：
「喂！那是……那是文艺创作！你懂什么！」

你继续逗他：
「哦～文艺创作～那你怎么不敢署名呀？」

林晨小声嘀咕：
「因为……我写完之后发现，我连那个人的名字都不知道。」

你愣住了。

「那你写的是……？」

林晨抬起头，看向操场方向：
「写给一个经常在榕树下画画的女生。我不知道她是谁，但我记得她画里的光。」

小橘在旁边感动得抹眼泪：
「呜呜呜，这是什么纯爱战士……」`,
bubble:{char:"orange",text:"太感人了！我们要帮帮这个傻瓜！"},
choices:[
{t:"🎨 帮他找到那个画画的女生",n:"linChenSuWan"},
{t:"🤝 说『我帮你传信！』",n:"linChenMessenger"}
]},

"linChenSuWan":{id:"linChenSuWan",type:"narrative",emotion:"happy",icon:"💕",scene:"美术教室",
text:`你拉着林晨跑到美术教室。

推开门，苏晚正对着画架发呆。

看到你们俩一起出现，她吓了一跳：
「诶？你们……？」

林晨深吸一口气：
「那个……你是那个在操场画画的女生吗？」

苏晚的脸瞬间红了。

她低下头，轻轻嗯了一声。

林晨鼓足勇气：
「那封信……是写给你的。」

苏晚愣住了。

然后她笑了，眼睛弯弯的：
「我知道啊。」

「因为那天，我看到你往书里夹东西了。」
「我在等你亲自来告诉我呢。」

林晨：！！！

你和小橘在旁边疯狂起哄：
「哦～～～～～」

text:`你爬上教学楼天台，风很大。

text:`你打开信纸，发现里面还夹着一张照片。

text:`✨ 恭喜你！集齐了所有6个记忆碎片！✨

你回头看去——
林晨和苏晚在天台上看夕阳，
陈屿在写一首永远写不完的诗，

这封信其实从来不是写给某个人的。

谢谢你，愿意做这封信的信使。

所有的错过，都会以另一种方式重逢。

function UT(){let total=Object.keys(SD).filter(k=>SD[k].type!=='ending').length;let pct=Math.min(100,Math.round((GS.vis.size/total)*100));E.pbf.style.width=pct+'%';E.pbt.textContent=pct+'%';E.fsc.textContent='⭐'+GS.frags.length+'/6';let maxAff=Math.max(...Object.values(GS.aff));E.fav.textContent=maxAff>=80?'❤️':maxAff>=40?'💛':'🤍'}
function SB(t,ch,em){E.cb.textContent=t;E.cb.style.display='block';let expr=em==='happy'?'😊':em==='surprised'?'😲':em==='thinking'?'🤔':'😊';E.av.textContent=GS.ct==='orange'?expr:(expr==='😊'?'😄':expr==='😲'?'😮':expr==='🤔'?'🧐':'😄');setTimeout(()=>{if(E.cb)E.cb.style.display='none'},4000)}

function TW(txt,el,cb){let i=0;el.textContent='';el.innerHTML='';if(GS.tt)clearInterval(GS.tt);GS.cr=false;GS.tt=setInterval(()=>{if(i<txt.length){el.textContent+=txt[i];i++;E.sa.scrollTop=E.sa.scrollHeight}else{clearInterval(GS.tt);GS.tt=null;el.innerHTML=el.textContent+'<span class="csr"></span>';if(cb)cb()}},28)}
function SK(txt,el){if(GS.tt)clearInterval(GS.tt);GS.tt=null;el.innerHTML=txt+'<span class="csr"></span>';E.sa.scrollTop=E.sa.scrollHeight}

function SC(chs,cb){E.ch.innerHTML='';if(!chs||chs.length===0){E.ch.innerHTML='<button class="chb" style="justify-content:center">✨ 继续 ▶</button>';E.ch.querySelector('.chb').onclick=()=>cb&&cb();GS.cr=true;return}
chs.forEach(c=>{let b=document.createElement('button');b.className='chb';b.textContent=c.t;b.onclick=()=>{if(c.n)NN(c.n)};E.ch.appendChild(b)});GS.cr=true}

function RSC(node){let oldIco=E.sc.querySelector('.ico');if(oldIco)oldIco.remove();E.st.textContent='';E.st.innerHTML='';E.ch.innerHTML='';if(node.icon){E.st.insertAdjacentHTML('beforebegin','<div class="ico">'+node.icon+'</div>')}E.sc.style.animation='none';E.sc.offsetHeight;E.sc.style.animation='cIn .5s ease';TW(node.text||'',E.st,()=>SC(node.choices));E.sa.scrollTop=0}

function NN(nid){if(!nid||!SD[nid])return;GS.cn=nid;GS.hist.push(nid);GS.vis.add(nid);let node=SD[nid];if(node.collectible)AF(node.collectible);let scenes={'start':'老图书馆',checkEnvelope:'老图书馆',chickenOut:'老图书馆',canMystery:'老图书馆',libraryRecord:'图书馆二楼',puzzlePassword:'图书馆二楼',puzzleWin:'图书馆密室',puzzleFail:'图书馆二楼',linChenMeet:'操场·篮球场',linChenReason:'操场·篮球场',linChenTease:'操场·篮球场',suWanMeet:'美术教室',suWanConfess:'美术教室',suWanWho:'美术教室',linChenSuWan:'美术教室',linChenMessenger:'操场·篮球场',canteen:'小卖部',canteenAnswer1:'小卖部',canteenAnswer2:'小卖部',canteenAnswer3:'小卖部',rooftop:'教学楼天台',rooftopReveal:'教学楼天台',rooftopHelp:'教学楼天台',observatory:'天文台',observatoryFinal:'天文台',puzzleStar:'天文台·星空'};E.sg.textContent='📍 '+(scenes[nid]||'校园某处');UT();if(node.bubble)SB(node.bubble.text,node.bubble.char,node.emotion);let expr=node.emotion==='happy'?'😊':node.emotion==='surprised'?'😲':node.emotion==='thinking'?'🤔':'😊';E.av.textContent=GS.ct==='orange'?expr:(expr==='😊'?'😄':expr==='😲'?'😮':expr==='🤔'?'🧐':'😄');if(node.type==='ending'){SE(node);return}if(node.type==='password'){RPW(node);return}if(node.type==='starGame'){RSG(node);return}RSC(node)}

// 好感度触发
let _origNN=NN;NN=function(nid){let o=GS.cn;if(o==='linChenMeet')UA('l',10);if(o==='suWanMeet')UA('s',10);if(o==='rooftop')UA('c',10);if(o==='canteen')UA('w',10);if(o==='canteenAnswer2')UA('w',-5);_origNN(nid)}

// ===== 密码谜题 =====
function RPW(node){E.st.textContent=node.text||'';E.st.innerHTML=E.st.textContent+'<span class="csr"></span>';E.ch.innerHTML='';let pi='';let disp=document.createElement('div');disp.id='pw-d';disp.style.cssText='min-height:36px;letter-spacing:6px;text-align:center;font-size:28px;font-family:monospace;margin:12px 0';E.ch.appendChild(disp);let pad=document.createElement('div');pad.className='np';pad.style.cssText='display:grid;grid-template-columns:repeat(3,1fr);gap:7px;max-width:180px;margin:0 auto 10px';for(let i=1;i<=9;i++){let b=document.createElement('button');b.className='nb';b.textContent=i;b.onclick=()=>{pi+=i;disp.textContent=pi;if(pi==='6'){setTimeout(()=>{T('✅ 正确！暗格打开了！');NN('puzzleWin')},300)}else if(pi.length>=2){pi='';disp.textContent='';T('❌ 不对哦')}};pad.appendChild(b)}let cb=document.createElement('button');cb.className='nb';cb.textContent='C';cb.onclick=()=>{pi='';disp.textContent=''};pad.appendChild(cb);let zb=document.createElement('button');zb.className='nb';zb.textContent='0';zb.onclick=()=>{pi+='0';disp.textContent=pi;if(pi.length>=2){pi='';disp.textContent='';T('❌ 不对哦')}};pad.appendChild(zb);let sb=document.createElement('button');sb.className='nb';sb.textContent='✓';sb.onclick=()=>{if(pi==='6'){T('✅ 密码正确！');NN('puzzleWin')}else{pi='';disp.textContent='';T('❌ 密码错误')}};pad.appendChild(sb);E.ch.appendChild(pad);let hb=document.createElement('button');hb.className='mh';hb.textContent='💡 查看提示';hb.style.cssText='display:block;margin:8px auto;background:none;border:none;color:var(--a);cursor:pointer;font-size:11px;font-family:inherit';hb.onclick=()=>T('提示：借阅卡背面 "3×7-15=?"');E.ch.appendChild(hb);GS.cr=true}

// ===== 星座连线小游戏 =====
function RSG(node){E.st.textContent=node.text||'';E.st.innerHTML=E.st.textContent+'<span class="csr"></span>';E.ch.innerHTML='';GS.sp=[];GS.ss=false;let cv=document.createElement('canvas');cv.width=300;cv.height=300;cv.style.cssText='display:block;margin:10px auto;border-radius:12px;background:#0a0a2e;touch-action:none;width:270px;height:270px';let stars=[{x:150,y:60},{x:240,y:110},{x:150,y:210},{x:60,y:110}];let ctx=cv.getContext('2d');let seq=[0,1,2,3];
function draw(){ctx.clearRect(0,0,300,300);for(let i=0;i<30;i++){ctx.fillStyle='rgba(255,255,255,'+(.2+Math.random()*.3)+')';ctx.beginPath();ctx.arc(Math.random()*300,Math.random()*300,1.2,0,Math.PI*2);ctx.fill()}for(let i=0;i<4;i++){let s=stars[i];let done=GS.sp.includes(i);ctx.beginPath();ctx.fillStyle=done?'#ffd700':'#fff';ctx.shadowColor=done?'#ffd700':'#fff';ctx.shadowBlur=done?18:8;let r=done?12:8;for(let a=0;a<5;a++){let ang=a*Math.PI*2/5-Math.PI/2;let dx=s.x+Math.cos(ang)*r;let dy=s.y+Math.sin(ang)*r;if(a===0)ctx.moveTo(dx,dy);else ctx.lineTo(dx,dy)}ctx.closePath();ctx.fill();ctx.shadowBlur=0;ctx.fillStyle='#fff';ctx.font='11px sans-serif';ctx.textAlign='center';ctx.fillText(i+1,s.x,s.y+22)}for(let i=1;i<GS.sp.length;i++){let a=stars[GS.sp[i-1]],b=stars[GS.sp[i]];ctx.beginPath();ctx.strokeStyle='rgba(255,215,0,.7)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();ctx.setLineDash([])}if(GS.sp.length===4){ctx.beginPath();ctx.strokeStyle='rgba(255,215,0,.7)';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.moveTo(stars[GS.sp[3]].x,stars[GS.sp[3]].y);ctx.lineTo(stars[GS.sp[0]].x,stars[GS.sp[0]].y);ctx.stroke();ctx.setLineDash([])}}
function handleTap(e){if(GS.ss)return;let rect=cv.getBoundingClientRect();let sx=(e.touches?e.touches[0].clientX:e.clientX)-rect.left;let sy=(e.touches?e.touches[0].clientY:e.clientY)-rect.top;let sw=cv.width/rect.width;let sh=cv.height/rect.height;sx*=sw;sy*=sh;for(let i=0;i<4;i++){let s=stars[i];let dx=sx-s.x,dy=sy-s.y;if(Math.sqrt(dx*dx+dy*dy)<25&&!GS.sp.includes(i)){let next=seq[GS.sp.length];if(i===next){GS.sp.push(i);draw();if(GS.sp.length===4){GS.ss=true;T('✨ 心形完成！秘密揭晓！');setTimeout(()=>NN('endingStar'),1500)}}else{T('请按顺序点击：左上→右上→右下→左下')}break}}}cv.addEventListener('pointerdown',handleTap);cv.addEventListener('touchstart',e=>{e.preventDefault();handleTap(e)});draw();E.ch.appendChild(cv);let hint=document.createElement('button');hint.className='mh';hint.textContent='💡 提示：按顺序点击（1→2→3→4）画心形';hint.style.cssText='display:block;margin:6px auto;background:none;border:none;color:var(--a);cursor:pointer;font-size:11px;font-family:inherit';E.ch.appendChild(hint);GS.cr=true}

// ===== 结局系统 =====
function SE(node){E.eo.innerHTML='';let hasAll=GS.frags.length>=6;if(hasAll&&node.id!=='secretEnding'){node=SD.secretEnding}
E.eo.innerHTML='<div class="et">'+node.icon+' '+node.endingTitle+'</div><div class="es">'+node.endingSub+'</div><div class="ec">'+node.text.split('\n').join('<br>')+'</div><button class="eb" id="eb-replay">🔄 重新开始</button><button class="ebb" id="eb-share">📋 复制结局</button><div class="fo">已收集碎片：'+GS.frags.length+'/6 | 结局数：'+GS.hist.filter(h=>SD[h]&&SD[h].type==='ending').length+'</div>';E.eo.classList.add('on');document.getElementById('eb-replay').onclick=resetGame;document.getElementById('eb-share').onclick=()=>{let txt='【校园遗失的旧信】\n结局：'+node.endingTitle+'\n'+node.endingSub+'\n碎片：'+GS.frags.join('、')+'\n';navigator.clipboard?navigator.clipboard.writeText(txt).then(()=>T('✅ 已复制结局！')):T('复制失败')};confetti();if(hasAll)confetti()}

// ===== 撒花动画 =====
function confetti(){let colors=['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#ff922b','#cc5de8','#ff6b9d'];for(let i=0;i<60;i++){let el=document.createElement('div');el.className='confetti';el.style.left=Math.random()*100+'%';el.style.top='-20px';el.style.width=(6+Math.random()*8)+'px';el.style.height=(6+Math.random()*8)+'px';el.style.background=colors[Math.floor(Math.random()*colors.length)];el.style.borderRadius=Math.random()>.5?'50%':'2px';el.style.animationDuration=(1.5+Math.random()*3)+'s';el.style.animationDelay=Math.random()*1+'s';document.body.appendChild(el);setTimeout(()=>el.remove(),4000)}}

// ===== 存档系统 =====
function saveGame(){let data=JSON.stringify({cn:GS.cn,hist:GS.hist,frags:GS.frags,aff:GS.aff,vis:[...GS.vis],dark:GS.dark});localStorage.setItem('lostletter_save',data);T('💾 进度已保存！')}
function loadGame(){let raw=localStorage.getItem('lostletter_save');if(!raw){T('📭 没有存档');return}try{let d=JSON.parse(raw);GS.cn=d.cn;GS.hist=d.hist||[];GS.frags=d.frags||[];GS.aff=d.aff||{l:0,s:0,c:0,w:0,x:0};GS.vis=new Set(d.vis||[]);if(d.dark){GS.dark=true;E.app.setAttribute('data-theme','dark')}UT();NN(GS.cn);T('📂 进度已读取！')}catch(e){T('❌ 读取失败')}}
function resetGame(){GS={cn:'start',hist:[],frags:[],aff:{l:0,s:0,c:0,w:0,x:0},vis:new Set,click:0,dark:false,ct:'orange',tt:null,cr:false,sp:[],ss:false};E.eo.classList.remove('on');E.mo.classList.remove('on');E.sp.classList.remove('on');UT();NN('start');T('🔄 重新开始！')}

// ===== 菜单面板 =====
E.mu.onclick=(e)=>{e.stopPropagation();E.sp.classList.toggle('on')};
document.addEventListener('click',(e)=>{if(!E.sp.contains(e.target)&&e.target!==E.mu)E.sp.classList.remove('on')});
$('sp-save').onclick=()=>{saveGame();E.sp.classList.remove('on')};
$('sp-load').onclick=()=>{loadGame();E.sp.classList.remove('on')};
$('sp-reset').onclick=()=>{if(confirm('确定要重新开始吗？当前进度将丢失。'))resetGame();E.sp.classList.remove('on')};
$('sp-theme').onclick=()=>{GS.dark=!GS.dark;E.app.setAttribute('data-theme',GS.dark?'dark':'light');$('sp-theme').textContent=GS.dark?'☀️ 切换主题':'🌙 切换主题';T(GS.dark?'🌙 深色模式':'☀️ 浅色模式');E.sp.classList.remove('on')};

// ===== 角色切换 & 彩蛋 =====
E.av.onclick=()=>{GS.click++;if(GS.click>=10){T('你再点我我就罢工了！😤');GS.click=0;setTimeout(()=>T('好啦好啦开玩笑的~'),2000)}if(GS.click===5)T('喂！别戳了！好痒！😂');GS.ct=GS.ct==='orange'?'blue':'orange';E.av.textContent=GS.ct==='orange'?'👧':'👦'}

// ===== 点击剧情卡片跳过打字 =====
E.sc.addEventListener('click',(e)=>{if(e.target.closest('.chb'))return;if(GS.tt&&!GS.cr){let node=SD[GS.cn];if(node){SK(node.text||'',E.st);SC(node.choices)}}})

// ===== 长按图书馆触发彩蛋 =====
let pressTimer;
E.sc.addEventListener('pointerdown',()=>{clearTimeout(pressTimer);pressTimer=setTimeout(()=>{let scenes={'start':'老图书馆',checkEnvelope:'老图书馆',chickenOut:'老图书馆',canMystery:'老图书馆',libraryRecord:'图书馆二楼',puzzlePassword:'图书馆二楼',puzzleWin:'图书馆密室',puzzleFail:'图书馆二楼'};if(scenes[GS.cn]){T('📚 隐藏书架出现了！这是校园传说的一部分...')}},3000)});
E.sc.addEventListener('pointerup',()=>clearTimeout(pressTimer));
E.sc.addEventListener('pointerleave',()=>clearTimeout(pressTimer));

// ===== 启动游戏 =====
NN('start');
</script>
